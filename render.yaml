services:
  - type: web
    name: staffiq-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SKIP_CAPTCHA
        value: "false"
      - key: SKIP_VERIFICATION
        value: "true"
      - key: NODE_ENV
        value: production
